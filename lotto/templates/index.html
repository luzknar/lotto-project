<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6/45 로또 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; margin-top: 50px; background-color: #f9f9f9; }
        .container { background: white; padding: 30px; display: inline-block; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .num-box { display: inline-block; width: 50px; height: 50px; line-height: 50px; font-size: 20px; font-weight: bold; color: white; background-color: #fbc02d; border-radius: 50%; margin: 5px; }
        .btn-refresh { margin-top: 20px; padding: 10px 20px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        /* 입력창을 조금 더 예쁘게 만들기 위한 스타일 추가 */
        .input-num { width: 40px; padding: 5px; text-align: center; font-size: 16px; margin: 2px; }
        .btn-submit { padding: 10px 20px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>6/45 Lotto 웹 사이트</h1>
        <p>이번 주 추천 자동 번호입니다.</p>
        
        <div>
            {% for num in numbers %}
                <span class="num-box">{{ num }}</span>
            {% endfor %}
        </div>

        <button class="btn-refresh" onclick="location.reload()">다른 번호 뽑기</button>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #ccc;">
        
        <h3>수동 번호 입력</h3>
        <p style="color: #666; font-size: 14px;">1부터 45 사이의 숫자를 입력하세요.</p>
        
        <form action="/buy/" method="POST">
            {% csrf_token %} 
            <input type="number" name="num1" min="1" max="45" required class="input-num">
            <input type="number" name="num2" min="1" max="45" required class="input-num">
            <input type="number" name="num3" min="1" max="45" required class="input-num">
            <input type="number" name="num4" min="1" max="45" required class="input-num">
            <input type="number" name="num5" min="1" max="45" required class="input-num">
            <input type="number" name="num6" min="1" max="45" required class="input-num">
            <br>
            <button type="submit" class="btn-submit">수동 구매하기</button>
        </form>
        </div> </body>
</html>
